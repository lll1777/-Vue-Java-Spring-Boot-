server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticket_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: TicketHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ticketManagementSecretKey2024VeryLongSecretKeyForJwtTokenGeneration
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

sla:
  warning-before-minutes: 30
  check-interval-seconds: 60

logging:
  level:
    com.ticket.management: DEBUG
    org.hibernate.SQL: DEBUG
